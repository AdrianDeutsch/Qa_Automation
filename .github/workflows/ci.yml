name: CI

# Mirrors the GitLab pipeline (.gitlab-ci.yml) as GitHub Actions jobs.
# Fail-fast test pyramid: unit (always, blocks everything) -> API smoke (push) ->
# API + DB e2e (pull request) -> regression (nightly schedule).
#
# NOTE on UI tests: the public demo shop (practicesoftwaretesting.com) is protected
# by a Cloudflare bot challenge that triggers for data-center IPs like GitHub's hosted
# runners. The @ui scenarios therefore run locally / on self-hosted runners with a
# residential egress IP (see README) and are excluded from the hosted jobs below via
# "TestCategory!=ui". Evading the bot protection is intentionally out of scope.

on:
  push:
    branches: [main]
  pull_request:
  schedule:
    - cron: "0 2 * * *" # nightly 02:00 UTC -> full regression (minus UI)
  workflow_dispatch:

env:
  DOTNET_CLI_TELEMETRY_OPTOUT: "1"
  DOTNET_SKIP_FIRST_TIME_EXPERIENCE: "1"
  HEADLESS: "true"
  SHOPGUARD_ENV: "local"

jobs:
  # Fast feedback: unit tests + coverage. If this is red, nothing else runs.
  unit:
    name: Unit & Coverage
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "10.0.x"
      - name: Build
        run: dotnet build ShopGuard -c Release
      - name: Unit tests + coverage
        run: |
          dotnet test ShopGuard/ShopGuard.UnitTests -c Release --no-build \
            --collect:"XPlat Code Coverage" \
            --logger "junit;LogFilePath=$GITHUB_WORKSPACE/TestResults/unit.junit.xml" \
            --results-directory TestResults
      - name: Coverage report
        run: |
          dotnet tool install --global dotnet-reportgenerator-globaltool
          export PATH="$PATH:$HOME/.dotnet/tools"
          reportgenerator \
            -reports:"TestResults/**/coverage.cobertura.xml" \
            -targetdir:coverage \
            -reporttypes:"Html;TextSummary;MarkdownSummaryGithub" \
            -assemblyfilters:"+ShopGuard.Core"
          cat coverage/SummaryGithub.md >> "$GITHUB_STEP_SUMMARY"
          grep -E "Line coverage|Branch coverage" coverage/Summary.txt
      - name: Upload coverage
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: coverage-report
          path: coverage/

  # API smoke on every push (the @ui smoke scenarios run locally, see note above).
  smoke:
    name: API Smoke (@smoke)
    needs: unit
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "10.0.x"
      - name: Smoke tests (API)
        run: |
          # restful-booker can be slow; retry the suite up to 3 times before failing.
          for attempt in 1 2 3; do
            dotnet test ShopGuard/ShopGuard.E2ETests -c Release \
              --filter "TestCategory=smoke&TestCategory!=ui" \
              --logger "junit;LogFilePath=$GITHUB_WORKSPACE/TestResults/smoke.junit.xml" \
              && exit 0
            echo "attempt $attempt failed"
          done
          exit 1
      - name: Upload results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: smoke-results
          path: TestResults/

  # Full API + DB suite on pull requests (maps to the GitLab "feature" stage).
  e2e:
    name: E2E (api|db)
    needs: unit
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "10.0.x"
      - name: API + DB tests
        run: |
          for attempt in 1 2 3; do
            dotnet test ShopGuard/ShopGuard.E2ETests -c Release \
              --filter "TestCategory=api|TestCategory=db" \
              --logger "junit;LogFilePath=$GITHUB_WORKSPACE/TestResults/e2e.junit.xml" \
              && exit 0
            echo "attempt $attempt failed"
          done
          exit 1
      - name: Upload results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: e2e-results
          path: TestResults/

  # Complete test set nightly, minus the Cloudflare-blocked UI scenarios.
  regression:
    name: Regression (no UI)
    needs: unit
    if: github.event_name == 'schedule' || github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "10.0.x"
      - name: Full suite (excluding @ui)
        run: |
          dotnet test ShopGuard -c Release \
            --filter "TestCategory!=ui" \
            --logger "junit;LogFilePath=$GITHUB_WORKSPACE/TestResults/regression.junit.xml"
      - name: Upload results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: regression-results
          path: TestResults/
